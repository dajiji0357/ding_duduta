<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Duduta 커뮤니티 보드</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=SUIT:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
</head>
<body>
  <div class="page-bg-shape shape-1"></div>
  <div class="page-bg-shape shape-2"></div>
  <div class="duduta-walker-track" aria-hidden="true">
    <div class="duduta-walker">
      <img class="duduta-walker-img" src="assets/hotdog-walker.png" alt="" onerror="this.onerror=null;this.src='data:image/svg+xml;utf8,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22120%22 height=%22120%22 viewBox=%220 0 120 120%22%3E%3Ctext x=%2250%25%22 y=%2258%25%22 text-anchor=%22middle%22 font-size=%2280%22%3E%F0%9F%8C%AD%3C/text%3E%3C/svg%3E';">
    </div>
  </div>

  <div class="layout">
    <aside class="panel sidebar">
      <div class="sidebar-title-row">
        <h1>DUDUTA</h1>
        <button id="themeToggleBtn" class="theme-icon-btn" onclick="toggleTheme()" aria-label="다크모드 전환" title="다크모드 전환"></button>
      </div>
      <p class="muted">두두타즈 즐겜러들 어서오고</p>

      <div class="menu-title">카테고리</div>
      <div id="channelList" class="channel-list">
        <button class="channel-btn active" data-channel="all"># 전체</button>
        <button class="channel-btn" data-channel="쿠폰정보"># 쿠폰 정보</button>
        <button class="channel-btn" data-channel="게임정보"># 게임 정보</button>
        <button class="channel-btn" data-channel="소통"># 소통</button>
      </div>

      <div id="rightFeedPreview" class="sidebar-feed-preview">
        <div class="panel-head">
          <h3>소통 피드 미리보기</h3>
        </div>
        <div id="chatFeedList" class="feed-list"></div>
        <div id="chatFeedPager" class="feed-pager"></div>
      </div>

      <div class="menu-title auth-title">회원/관리</div>
      <div class="auth-box">
        <div id="authStatus" class="auth-status">로그인: Guest</div>
        <div class="auth-actions">
          <button id="authSignupBtn" onclick="openModal('signupModal')">회원가입</button>
          <button id="authLoginBtn" onclick="openModal('loginModal')">로그인</button>
        </div>
        <button id="authRenameBtn" onclick="openModal('renameModal')">닉네임 변경</button>
      </div>
    </aside>

    <main class="main-col">
      <section class="panel composer">
        <div class="composer-head">
          <h2>게시글 등록</h2>
          <span id="activeChannelTag" class="tag">#전체</span>
        </div>

        <div class="composer-grid">
          <select id="typeSelect">
            <option value="쿠폰정보">쿠폰 정보</option>
            <option value="게임정보">게임 정보</option>
            <option value="소통" selected>소통</option>
          </select>
          <input id="nicknameInput" type="text" placeholder="아이디" maxlength="24">
        </div>

        <input id="titleInput" type="text" placeholder="게시판제목" maxlength="80">
        <textarea id="messageInput" placeholder="게시판내용" maxlength="600"></textarea>

        <div class="composer-actions">
          <span class="muted">링크를 넣으면 클릭 가능한 주소로 자동 표시됩니다.</span>
          <div class="action-row">
            <button class="btn-primary" onclick="addPost()">등록</button>
          </div>
        </div>
      </section>
      <section id="mainFeedPanel" class="panel feed">
        <div class="panel-head">
          <h3>커뮤니티 피드</h3>
        </div>
        <div id="mainFeedList" class="feed-list"></div>
        <div id="mainFeedPager" class="feed-pager"></div>
      </section>

      <section id="adminPanel" class="panel admin-panel hidden">
        <div class="panel-head">
          <h3>관리자 페이지</h3>
          <button class="btn-ghost" onclick="logoutAdmin()">관리자 종료</button>
        </div>
        <div class="admin-actions">
          <button class="btn-ghost" onclick="openAdminUsersModal()">회원리스트</button>
          <button class="btn-ghost" onclick="clearPosts()">게시글 전체 삭제</button>
        </div>
        <h4>게시글 관리</h4>
        <div id="adminPostList" class="admin-list"></div>
      </section>
    </main>
  </div>

  <button id="floatingAdminBtn" class="floating-admin-btn" onclick="toggleAdminAuth()">ADMIN</button>

  <div id="signupModal" class="modal" onclick="closeOnBackdrop(event, 'signupModal')">
    <div class="modal-content">
      <button class="close-btn" onclick="closeModal('signupModal')">&times;</button>
      <h3>회원가입</h3>
      <input id="regNameInput" type="text" placeholder="가입 닉네임" maxlength="24">
      <input id="regPwInput" type="password" placeholder="가입 비밀번호" maxlength="32">
      <button class="btn-primary full" onclick="registerUser()">가입하기</button>
    </div>
  </div>

  <div id="loginModal" class="modal" onclick="closeOnBackdrop(event, 'loginModal')">
    <div class="modal-content">
      <button class="close-btn" onclick="closeModal('loginModal')">&times;</button>
      <h3>로그인</h3>
      <select id="loginUserSelect"></select>
      <input id="loginPwInput" type="password" placeholder="로그인 비밀번호" maxlength="32">
      <button class="btn-primary full" onclick="loginUser()">로그인</button>
    </div>
  </div>

  <div id="renameModal" class="modal" onclick="closeOnBackdrop(event, 'renameModal')">
    <div class="modal-content">
      <button class="close-btn" onclick="closeModal('renameModal')">&times;</button>
      <h3>닉네임 변경</h3>
      <input id="renameNameInput" type="text" placeholder="새 닉네임" maxlength="24">
      <button class="btn-primary full" onclick="changeNickname()">변경 저장</button>
    </div>
  </div>

  <div id="adminModal" class="modal" onclick="closeOnBackdrop(event, 'adminModal')">
    <div class="modal-content">
      <button class="close-btn" onclick="closeModal('adminModal')">&times;</button>
      <h3>어드민 로그인</h3>
      <input id="adminPwInput" type="password" placeholder="비밀번호" maxlength="32">
      <button class="btn-primary full" onclick="loginAdmin()">어드민 로그인</button>
    </div>
  </div>

  <div id="postEditModal" class="modal" onclick="closeOnBackdrop(event, 'postEditModal')">
    <div class="modal-content">
      <button class="close-btn" onclick="closeModal('postEditModal')">&times;</button>
      <h3>게시글 수정</h3>
      <select id="editNickSelect"></select>
      <select id="editTypeSelect">
        <option value="쿠폰정보">쿠폰 정보</option>
        <option value="게임정보">게임 정보</option>
        <option value="소통">소통</option>
      </select>
      <input id="editTitleInput" type="text" maxlength="80" placeholder="수정할 제목을 입력하세요.">
      <textarea id="editMessageInput" maxlength="600" placeholder="수정할 내용을 입력하세요."></textarea>
      <button class="btn-primary full" onclick="saveEditedPost()">수정 저장</button>
    </div>
  </div>

  <div id="adminUsersModal" class="modal" onclick="closeOnBackdrop(event, 'adminUsersModal')">
    <div class="modal-content">
      <button class="close-btn" onclick="closeModal('adminUsersModal')">&times;</button>
      <h3>회원 관리</h3>
      <div id="adminUserList" class="admin-list"></div>
    </div>
  </div>

  <script src="app.js?v=20260310-11"></script>
</body>
</html>
